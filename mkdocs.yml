site_name: RevvLink
site_dir: ../site
site_description: The elite Lavalink wrapper for Python. Engineered for high-load music bots with a focus on speed, stability, and developer velocity.
site_url: https://revvlink.revvlabs.in
repo_url: https://github.com/RevvLabs/RevvLink
repo_name: RevvLabs/RevvLink
copyright: Copyright &copy; 2026 JustNixx &amp; Dipendra-creator — MIT License
docs_dir: .
theme:
  name: material
  custom_dir: overrides
  logo: assets/revlinkicon.png
  favicon: assets/revlinkicon.png

  font:
    text: DM Sans
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      primary: custom
      accent: custom

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sticky
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tooltips
    - announce.dismiss
    - header.autohide
    - toc.follow
    - toc.sticky

hooks:
  - hooks.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [..]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_bases: true
            show_if_no_docstring: false
            filters:
              - "!^_"
            docstring_options:
              warn_unknown_params: false
              warn_missing_types: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ded-lmfao/RevvLink
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/revvlink/
      name: PyPI
    - icon: fontawesome/brands/discord
      link: https://discord.gg/7KcKr2Grc7
      name: Discord
  version:
    provider: mike

nav:
  - Overview:
    - Introduction: index.md
    - Installation: installation.md
    - Instant Start ⚡: guides/instant-start.md
    - Quick Start: quickstart.md
  - Guides:
    - guides/node-pool.md
    - guides/player.md
    - guides/tracks-search.md
    - guides/queue.md
    - guides/filters.md
    - guides/autoplay.md
    - guides/events.md
    - guides/chat-widget.md
  - API Reference:
    - api/index.md
    - api/pool.md
    - api/node.md
    - api/player.md
    - api/queue.md
    - api/playable.md
    - api/events.md
    - api/filters.md
    - api/payloads.md
    - api/enums.md
    - api/exceptions.md
  - Recipes: recipes.md
